<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Assistente Musical</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- MENU -->
  <div id="menu">
    <h1>🎸 Assistente Musical</h1>
    <button id="btnAssistente">🎸 Assistente</button>
    <button id="btnAfinador">🎯 Afinador</button>
  </div>

  <!-- ASSISTENTE -->
  <div id="assistente" class="hidden">
    <button id="btnVoltar1">⬅️ Voltar</button>
    <h2>🎸 Assistente</h2>

    <button id="startBtn">Iniciar</button>

    <div id="status">Status: parado</div>
    <div id="key">--</div>
    <div id="confidence">Confiança: --</div>

    <div class="bar">
      <div class="fill" id="fill"></div>
    </div>

    <div id="chords"></div>
  </div>

  <!-- AFINADOR -->
  <div id="afinador" class="hidden">
    <button id="btnVoltar2">⬅️ Voltar</button>
    <h2>🎯 Afinador</h2>

    <button id="tunerBtn">Iniciar Afinador</button>

    <div id="note">--</div>
    <div id="freq">-- Hz</div>

    <div class="meter">
      <div class="center-line"></div>
      <div id="needle"></div>
    </div>

    <div class="scale">
      <span>-50</span>
      <span>-20</span>
      <span>0</span>
      <span>+20</span>
      <span>+50</span>
    </div>

    <div id="cents">0 cents</div>
  </div>

</div>

<script src="https://unpkg.com/meyda/dist/web/meyda.min.js"></script>
<script src="script.js"></script>

</body>
</html>
